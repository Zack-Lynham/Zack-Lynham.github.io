<html>
    <head>
        <script>
            let prediction = 2;
            // Returns a random integer :
            function coinflip(){
                let random = Math.floor(Math.random() * 2);
                console.log (random);
                
                    reset();
                    setTimeout(() => {
                    document.getElementById(random).style.display="block";
                }, 1000);
                document.getElementById("Tguess").style.display="none";
                document.getElementById("Hguess").style.display="none";
                if (prediction == random){
                    setTimeout(() => {
                    document.getElementById("win").style.display="block";
                }, 1000);
                     
                }
                else{
                    setTimeout(() => {
                    document.getElementById("lose").style.display="block";
                }, 1000);
                }
                document.getElementById('coin').classList.add('flip');
                setTimeout(() => {
                    document.getElementById('coin').style.animationPlayState = 'paused';
                }, 1000);
            }

            function reset(){
                document.getElementById("1").style.display="none";      
                document.getElementById("0").style.display="none";  
                document.getElementById("win").style.display="none";
                document.getElementById("lose").style.display="none";
                document.getElementById("Hguess").style.display="none";
                document.getElementById("Tguess").style.display="none";
                document.getElementById('coin').classList.remove('flip');
                document.getElementById('coin').style.animationPlayState = 'running';
            }
            function selectH(){
                prediction = 1;
                document.getElementById("win").style.display="none";
                document.getElementById("lose").style.display="none";
                document.getElementById("Hguess").style.display="block";
                document.getElementById("Tguess").style.display="none";
            }
            function selectT(){
                prediction = 0;
                document.getElementById("lose").style.display="none";
                document.getElementById("win").style.display="none";
                document.getElementById("Tguess").style.display="block";
                document.getElementById("Hguess").style.display="none";
            }

        </script>

        <style>
             @keyframes flip {
                0% {
                    transform: rotateX(0deg);
                }
                100% {
                    transform: rotateX(360deg);
                }
            }
            .flip {
                animation: flip 1s linear infinite;
            }
        </style>

        <title>Coin-Flip</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/tw-elements/dist/css/tw-elements.min.css"/>
        <script src="https://cdn.tailwindcss.com/3.3.0"></script>
    </head>
    <body class="bg-gradient-to-t from-orange-800 to-red-800">
            <div class="grid grid-cols-3 gap-16 pr-32 pl-32 pt-64">
        <button class="text-8xl font-bold text-white bg-red-500 border-8 border-white rounded-lg" onclick="selectH()">Heads</button>
        <button class="font-bold text-9xl underline bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-red-500 pb-4" onclick="coinflip()">Flip</button>
        <button class="text-8xl font-bold text-white bg-blue-500 border-8 border-white rounded-lg" onclick="selectT()">Tails</button>
            </div>
        <p class="text-center hidden text-8xl underline font-bold text-white bg-red-500 border-8 border-white rounded-lg p-16 m-16 mr-48 ml-48" id="1">Heads!</p>
        <p class="text-center hidden text-8xl underline font-bold text-white bg-blue-500 border-8 border-white rounded-lg p-16 m-16 mr-48 ml-48 " id="0">Tails!</p>  
        <div class="grid grid-cols-3 w-full fixed top-16">
            <p> </p>
        <p class="text-center mx-auto text-8xl hidden text-white font-bold" id="win">You Win!</p>
        <p class="text-center mx-auto text-8xl hidden text-white font-bold" id="lose">You Lost...</p>
        <p> </p>
        </div>
        <p class="text-center text-5xl hidden text-white font-bold" id="Tguess">Selected: Tails</p>
        <p class="text-center text-5xl hidden text-white font-bold" id="Hguess">Selected: Heads</p>
        <div class="fixed bottom-4 left-4">
        <a href="index.html" class=" bg-white border-2 border-black p-2 rounded-lg">HOME ></a>
        </div>
        <div>
            <img class="w-[500px] mx-auto fixed bottom-16 right-0 left-0" id="coin" src="images/coin.png"/>
        </div>
        <div class="fixed top-4 left-4">
                <img class="w-32" src="images/logo.png"/>
        </div>
    </body>
</html>

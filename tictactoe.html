        <script>
            let array = [
                    ['','',''],
                    ['','',''],
                    ['','','']
                ];
            let go = 'o';
            let goes = 0;
            let win = false;
            document.addEventListener("DOMContentLoaded", () => {
            // document.getElementById("array").style.display = "none";
            document.getElementById("array").classList.add('hidden');
            });
            function changePlayer() {
                if (go == 'o') {
                    go = 'x'
                }
                else {
                    go = 'o'
                }
            }
            function reset() {
                array = [
                    ['','',''],
                    ['','',''],
                    ['','','']
                ];
                win = false
                start();
                showButton();
                goes = 0;
                for (let i=1;i<10;i++){
                    document.getElementById(i).innerText = '';
                }
                document.getElementById("array").classList.add('hidden');
                for (let i = 1; i<10; i++) {
                    document.getElementById(i).classList.remove("o");
                    document.getElementById(i).classList.remove("x");
                }
            }

            function start() {
                let randomgo = Math.floor(Math.random() * 2) + 1;
                
                document.getElementById("startBtn").style.display = "none";
                document.getElementById("array").classList.remove('hidden');
                if (randomgo == 1) {
                    go = 'o'
                }
                else {
                    go = 'x'
                }
            }
            function showButton() {
                document.getElementById("startBtn").style.display = "inline-block";
                document.getElementById("array").classList.add('hidden');
            }
            function showWinner(win) {
                document.getElementById("winner").innerText = win;
                document.getElementById("winnerPopUp").style.display = "inline-block";
            }
            function checkwinner() {
                for (let i = 0; i<3; i++) {
                    if (array[i][0] == array[i][1] && array[i][2]== array[i][0] && array[i][0]!= '') {
                        win = true;
                        console.log("True")
                        showWinner(go + ' Wins')
                    }
                }
                for (let i = 0; i<3; i++) {
                    if (array[0][i] == array[1][i] && array[2][i]== array[0][i] && array[0][i]!= '') {
                        win = true;
                        console.log("True")
                        showWinner(go + ' Wins')
                    }
                }
                if (array[0][0] == array[1][1] && array[2][2]== array[0][0] && array[0][0]!= '') {
                    win = true;
                    console.log("True")
                    showWinner(go + ' Wins')
                }
                else if (array[0][2] == array[1][1] && array[2][0]== array[0][2] && array[2][0]!= '') {
                    win = true;
                    console.log("True")
                    showWinner(go + ' Wins')
                }
                else if (goes == 9 && win!=true){
                    win = true;
                    console.log('Grid full')
                    showWinner('Draw')
                }
            }
            function playerGo(x, y, id){
                console.log(id)
                // is square empty
                if (array[x][y] != '') {
                    console.log('Button already has value')
                    return
                }
                if (win == true) { 
                    return
                }
                // its empty
                array[x][y] = go;
                goes++;
                if (go == 'x') {
                    document.getElementById(id).style.color = "blue";
                    document.getElementById(id).classList.add('x');
                }
                else {
                    document.getElementById(id).style.color = "red";
                    document.getElementById(id).classList.add("o");
                }
                // check for a win
                // for (let rows = 0; rows<3; rows++) {
                checkwinner();

                //     console.log("True")
                //     showWinner(go + ' Wins')
                // }

                // check grid is full
                
                changePlayer();
            }
